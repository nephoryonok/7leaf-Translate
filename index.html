<script>
const ruToScript = {
  "а":"а","б":"6","в":"В","г":"г","д":"д","е":"Ǝ","ё":"Ǝ","ж":"ж","з":"3",
  "и":"u","й":"й","к":"k","л":"L","м":"m","н":"N","о":"o","п":"n","р":"p",
  "с":"с","т":"t","у":"Y","ф":"ф","х":"х","ц":"ц","ч":"4","ш":"w","щ":"щ",
  "ъ":"ъ","ы":"ы","ь":"b","э":"э","ю":"ю","я":"R"
};

const scriptToRu = {
  "6":"б","В":"в","Ǝ":"е","3":"з","u":"и","U":"И","k":"к","L":"л","m":"м",
  "N":"н","o":"о","n":"п","Π":"П","p":"р","t":"т","Y":"у","4":"ч","w":"ш",
  "b":"ь","R":"я"
};

let fromLang = "ru";
let toLang = "lat";

function convert(text) {
  let result = "";
  for (const ch of text) {
    const low = ch.toLowerCase();
    result += ruToScript[low] !== undefined ? ruToScript[low] : ch;
  }
  return result;
}

function decode(text) {
  let result = "";
  for (const ch of text) {
    const d = scriptToRu[ch] || scriptToRu[ch.toLowerCase()];
    result += d || ch;
  }
  return result;
}

function syncLangUI() {
  document.querySelectorAll("#sourceLangBar .lang-btn").forEach(btn =>
    btn.classList.toggle("is-active", btn.dataset.lang === fromLang));
  document.querySelectorAll("#targetLangBar .lang-btn").forEach(btn =>
    btn.classList.toggle("is-active", btn.dataset.lang === toLang));
}

function doTranslate() {
  const text = document.getElementById("input").value;
  document.getElementById("output").value = text
    ? (fromLang === "ru" ? convert(text) : decode(text))
    : "";
}

function setDirection(from, to) {
  fromLang = from;
  toLang = to;
  syncLangUI();
  doTranslate();
}

document.getElementById("input").addEventListener("input", doTranslate);
document.getElementById("translateBtn").addEventListener("click", doTranslate);

document.getElementById("clearBtn").addEventListener("click", () => {
  document.getElementById("input").value = "";
  document.getElementById("output").value = "";
  document.getElementById("input").focus();
});

document.getElementById("swapBtn").addEventListener("click", () => {
  const tmp = fromLang;
  fromLang = toLang;
  toLang = tmp;
  document.getElementById("input").value = document.getElementById("output").value;
  syncLangUI();
  doTranslate();
});

document.querySelectorAll("#sourceLangBar .lang-btn").forEach(btn => {
  btn.addEventListener("click", () =>
    setDirection(btn.dataset.lang, btn.dataset.lang === "ru" ? "lat" : "ru"));
});

document.querySelectorAll("#targetLangBar .lang-btn").forEach(btn => {
  btn.addEventListener("click", () =>
    setDirection(btn.dataset.lang === "ru" ? "lat" : "ru", btn.dataset.lang));
});

document.getElementById("copyBtn").addEventListener("click", () => {
  const v = document.getElementById("output").value;
  if (v) navigator.clipboard.writeText(v);
});
</script>
